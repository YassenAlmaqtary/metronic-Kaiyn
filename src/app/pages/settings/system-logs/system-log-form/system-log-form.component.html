<div class="kt-container-fixed flex flex-col gap-5 max-w-3xl">
	<div class="flex items-center gap-2 text-sm text-secondary-foreground">
		<a class="hover:text-primary" routerLink="/demo1/settings/system-logs">{{ 'systemLogs.title' | translate }}</a>
		<i class="ki-filled ki-right text-xs rtl:rotate-180"></i>
		<span class="text-mono font-medium">{{ 'systemLogs.create' | translate }}</span>
	</div>

	<div class="kt-card">
		<div class="kt-card-header px-5 py-4 border-b border-border">
			<h1 class="text-lg font-semibold text-mono">{{ 'systemLogs.create' | translate }}</h1>
		</div>

		<form class="kt-card-content flex flex-col gap-5 p-5" [formGroup]="form" (ngSubmit)="onSubmit()">
			@if (errorMessage()) {
				<div class="rounded-lg border border-destructive/30 bg-destructive/10 px-4 py-3 text-sm text-destructive">
					{{ errorMessage() }}
				</div>
			}

			<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.userName' | translate }}</label>
					<input class="kt-input" formControlName="userName" type="text" />
				</div>

				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.actionType' | translate }}</label>
					<input class="kt-input" formControlName="actionType" type="text" />
				</div>

				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.tableName' | translate }}</label>
					<input class="kt-input" formControlName="tableName" type="text" />
				</div>

				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.recordId' | translate }}</label>
					<input class="kt-input" formControlName="recordID" type="text" />
				</div>

				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.actionDate' | translate }}</label>
					<input class="kt-input" formControlName="actionDate" type="datetime-local" />
				</div>

				<div class="flex flex-col gap-1">
					<label class="kt-form-label">{{ 'systemLogs.machineName' | translate }}</label>
					<input class="kt-input" formControlName="machineName" type="text" />
				</div>

				<div class="flex flex-col gap-1 md:col-span-2">
					<label class="kt-form-label">{{ 'systemLogs.ipAddress' | translate }}</label>
					<input class="kt-input" formControlName="ipAddress" type="text" />
				</div>

				<div class="flex flex-col gap-1 md:col-span-2">
					<label class="kt-form-label">{{ 'systemLogs.description' | translate }}</label>
					<textarea class="kt-textarea" formControlName="description" rows="4"></textarea>
				</div>
			</div>

			<div class="flex justify-end gap-2 pt-2 border-t border-border">
				<a class="kt-btn kt-btn-outline" routerLink="/demo1/settings/system-logs">
					{{ 'systemLogs.cancel' | translate }}
				</a>
				<button class="kt-btn kt-btn-primary" type="submit" [disabled]="saving()">
					@if (saving()) {
						<span class="size-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span>
					}
					{{ 'systemLogs.save' | translate }}
				</button>
			</div>
		</form>
	</div>
</div>
